<svg width="80" height="80" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="32" cy="32" r="31" fill="white" stroke="#D9BE80" stroke-width="2"/>
  <mask id="maskTN" maskUnits="userSpaceOnUse" x="1" y="1" width="62" height="62">
    <circle cx="32" cy="32" r="31" fill="white"/>
  </mask>
  <g mask="url(#maskTN)">
    <!-- Drapeau Tunisien: Rouge et Blanc avec croissant et étoile -->
    <rect x="1" y="1" width="62" height="31" fill="#CE1126"/>
    <rect x="1" y="33" width="62" height="30" fill="#CE1126"/>
    <rect x="1" y="31" width="62" height="2" fill="#FFFFFF"/>
    <!-- Cercle blanc au centre -->
    <circle cx="32" cy="32" r="12" fill="#FFFFFF"/>
    <!-- Croissant rouge -->
    <circle cx="28" cy="32" r="6" fill="#CE1126"/>
    <circle cx="30" cy="32" r="5" fill="#FFFFFF"/>
    <!-- Étoile rouge -->
    <g transform="translate(36, 32)">
      <polygon points="0,-5 1.5,-1.5 5,-1.5 2.5,1 3.5,5 0,2 -3.5,5 -2.5,1 -5,-1.5 -1.5,-1.5" fill="#CE1126"/>
    </g>
  </g>
</svg>
